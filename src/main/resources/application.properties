spring.application.name=msvc-products
#server.port=8001
server.port=${PORT:0}
eureka.instance.instance-id=${spring.cloud.client.hostname}:${spring.application.name}:${random.value}

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/db_springboot_cloud
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# create-drop: recrea tablas al iniciar y las borra al apagar → pierdes datos en cada arranque.
# update: ajusta el esquema a las entidades sin borrar filas (útil en local). En producción suele usarse validate + migraciones (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka